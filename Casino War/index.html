<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wojna</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="dealer">
        <img src="assets/card_back.png" alt="image" class="dealer-card" />
        <p class="dealer-card-txt">Waiting for game to start</p>
      </div>
      <hr />
      <h2
        id="countdown"
        style="display: none; text-align: center; font-size: 2em; color: red"
      ></h2>
      <hr />
      <div class="player">
        <p class="player-card-txt">Waiting for game to start</p>
        <img src="assets/card_back.png" alt="image" class="player-card" />
        <button class="deal-button">Deal</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
